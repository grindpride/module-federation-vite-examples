name: Test Vite Version
description: Run e2e tests for a specific vite version and framework

inputs:
  vite-version:
    description: Vite version to test (e.g. "5", "6", "rolldown-vite")
    required: true
  framework:
    description: Framework to test (e.g. "react", "vue", "svelte")
    required: true

runs:
  using: composite
  steps:
    - name: Update to vite ${{ inputs.vite-version }}
      shell: bash
      run: |
        if [ "${{ inputs.vite-version }}" = "rolldown-vite" ]; then
          pnpm up -r vite@npm:rolldown-vite
        else
          pnpm up -r vite@^${{ inputs.vite-version }}
        fi

    - name: Test dev
      shell: bash
      run: pnpm exec playwright test
      env:
        PLAYWRIGHT_TEST_COMMAND: pnpm ${{ inputs.framework }}:dev

    - name: Test preview
      shell: bash
      run: pnpm exec playwright test
      env:
        PLAYWRIGHT_TEST_COMMAND: pnpm ${{ inputs.framework }}:preview
